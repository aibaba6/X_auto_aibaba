services:
  - type: web
    name: x-auto-post-tool
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT ui.server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: TZ
        value: Asia/Tokyo
      - key: XAP_DATA_DIR
        value: /opt/render/project/src/data
      - key: OPENAI_API_KEY
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_SECRET
        sync: false
      - key: NANOBANANA_CMD_TEMPLATE
        sync: false
      - key: FREEPIK_API_KEY
        sync: false
    disk:
      name: x-auto-post-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
